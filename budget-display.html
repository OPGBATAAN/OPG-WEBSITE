<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIP Budget - Office of the Provincial Governor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            min-height: 100vh;
        }
        
        .budget-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .budget-header {
            background: linear-gradient(135deg, #1e3a8a 0%, #3730a3 100%);
            color: white;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(30, 58, 138, 0.3);
        }
        
        .budget-title { font-size: 2.5rem; font-weight: 700; margin-bottom: 10px; }
        .budget-subtitle { font-size: 1.1rem; opacity: 0.9; margin-bottom: 20px; }
        
        .upload-section {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            margin-bottom: 30px;
        }
        
        .upload-title {
            font-size: 1.3rem;
            color: #1e3a8a;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .upload-area {
            border: 2px dashed #cbd5e1;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            background: #f8fafc;
        }
        
        .upload-area:hover { border-color: #1e3a8a; background: #f1f5f9; }
        .upload-area.dragover { border-color: #10b981; background: #ecfdf5; }
        
        .upload-icon { font-size: 3rem; color: #94a3b8; margin-bottom: 15px; }
        .upload-text { color: #64748b; margin-bottom: 15px; }
        
        .upload-btn {
            background: linear-gradient(135deg, #1e3a8a 0%, #3730a3 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .upload-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(30, 58, 138, 0.3); }
        .file-input { display: none; }
        
        .controls-section {
            background: white;
            padding: 20px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .search-box {
            flex: 1;
            min-width: 250px;
            position: relative;
        }
        
        .search-box input {
            width: 100%;
            padding: 12px 40px 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }
        
        .search-box input:focus { outline: none; border-color: #1e3a8a; }
        .search-box i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }
        
        .filter-select {
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            background: white;
            cursor: pointer;
            min-width: 180px;
        }
        
        .action-btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }
        
        .btn-primary { background: linear-gradient(135deg, #1e3a8a 0%, #3730a3 100%); color: white; }
        .btn-success { background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; }
        .btn-warning { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); color: white; }
        .action-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
            transition: transform 0.3s ease;
        }
        
        .stat-card:hover { transform: translateY(-5px); }
        .stat-value { font-size: 2rem; font-weight: 700; color: #1e3a8a; margin-bottom: 5px; }
        .stat-label { color: #64748b; font-size: 0.95rem; }
        
        .sections-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .section-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .section-card:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(0,0,0,0.15); }
        
        .section-header {
            background: linear-gradient(135deg, #1e3a8a 0%, #3730a3 100%);
            color: white;
            padding: 20px;
        }
        
        .section-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 8px; }
        .section-meta { display: flex; gap: 15px; font-size: 0.85rem; opacity: 0.9; }
        
        .section-body { padding: 20px; }
        
        .budget-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .budget-item { text-align: center; }
        .budget-amount { font-size: 1.2rem; font-weight: 700; color: #10b981; }
        .budget-label { font-size: 0.8rem; color: #64748b; }
        
        .view-details-btn {
            width: 100%;
            padding: 12px;
            background: #f1f5f9;
            border: none;
            border-radius: 8px;
            color: #1e3a8a;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .view-details-btn:hover { background: #1e3a8a; color: white; }
        
        .data-table-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            overflow: hidden;
            margin-bottom: 30px;
        }
        
        .table-header {
            padding: 20px 30px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .table-title { font-size: 1.2rem; color: #1e3a8a; font-weight: 600; }
        
        .table-scroll {
            overflow-x: auto;
            max-height: 600px;
            overflow-y: auto;
        }
        
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        
        .data-table th {
            background: #1e3a8a;
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        
        .data-table td {
            padding: 12px 15px;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .data-table tr:hover { background: #f8fafc; }
        .data-table tr:nth-child(even) { background: #f8fafc; }
        .data-table tr:nth-child(even):hover { background: #f1f5f9; }
        
        .amount-cell {
            text-align: right;
            font-family: 'Courier New', monospace;
            font-weight: 600;
            color: #10b981;
        }
        
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #64748b 0%, #475569 100%);
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 8px;
            margin: 20px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .back-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        
        .loading-overlay {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.9);
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        
        .loading-overlay.active { display: flex; }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #e2e8f0;
            border-top-color: #1e3a8a;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .loading-text { margin-top: 15px; color: #1e3a8a; font-weight: 500; }
        
        .no-data {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
        }
        
        .no-data i { font-size: 4rem; margin-bottom: 20px; color: #cbd5e1; }
        
        .pill {
            background: #e0e7ff;
            color: #3730a3;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
        }
        
        code {
            background: #f1f5f9;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
        }
        
        @media (max-width: 768px) {
            .budget-title { font-size: 1.8rem; }
            .controls-section { flex-direction: column; }
            .search-box { width: 100%; }
            .sections-grid { grid-template-columns: 1fr; }
            .data-table { font-size: 0.8rem; }
            .data-table th, .data-table td { padding: 10px; }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">
        <i class="fas fa-arrow-left"></i> Back to Website
    </a>
    
    <div class="budget-container">
        <div class="budget-header">
            <div class="budget-title">AIP Budget</div>
            <div class="budget-subtitle">Annual Investment Plan - Upload and View Budget Data</div>
        </div>
        
        <div class="upload-section">
            <div class="upload-title">
                <i class="fas fa-cloud-upload-alt"></i>
                Upload Budget Data
            </div>
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">
                    <i class="fas fa-file-excel"></i>
                </div>
                <div class="upload-text">
                    Drag and drop your Excel or CSV file here<br>
                    <small>Supports .xlsx, .xls, and .csv files</small>
                </div>
                <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
                    <i class="fas fa-folder-open"></i> Browse File
                </button>
                <input type="file" id="fileInput" class="file-input" accept=".xlsx,.xls,.csv" onchange="handleFileSelect(event)">
            </div>
        </div>
        
        <div id="dataContent" style="display: none;">
            <div class="controls-section">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Search programs, projects, or codes..." onkeyup="searchData()">
                    <i class="fas fa-search"></i>
                </div>
                <select class="filter-select" id="sectionFilter" onchange="filterBySection()">
                    <option value="">All Sections</option>
                </select>
                <button class="action-btn btn-success" onclick="exportToExcel()">
                    <i class="fas fa-download"></i> Export Excel
                </button>
                <button class="action-btn btn-warning" onclick="clearData()">
                    <i class="fas fa-trash"></i> Clear
                </button>
            </div>
            
            <div class="stats-grid" id="statsGrid"></div>
            <div class="sections-grid" id="sectionsGrid"></div>
            
            <div class="data-table-container">
                <div class="table-header">
                    <div class="table-title">
                        <i class="fas fa-table"></i> Budget Details
                    </div>
                    <span id="rowCount">0 records</span>
                </div>
                <div class="table-scroll">
                    <table class="data-table" id="dataTable">
                        <thead>
                            <tr id="tableHeader"></tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <div class="no-data" id="noData">
            <i class="fas fa-file-upload"></i>
            <h3>No Data Loaded</h3>
            <p>Upload an Excel or CSV file to view the AIP Budget</p>
        </div>
    </div>
    
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text">Processing data...</div>
    </div>
    
    <script>
        let budgetData = [];
        let sections = [];
        let currentData = [];
        
        const uploadArea = document.getElementById('uploadArea');
        
        uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.classList.add('dragover'); });
        uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) processFile(e.dataTransfer.files[0]);
        });
        
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) processFile(file);
        }
        
        function processFile(file) {
            document.getElementById('loadingOverlay').classList.add('active');
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    const jsonData = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });
                    
                    parseBudgetData(jsonData);
                    
                    document.getElementById('loadingOverlay').classList.remove('active');
                    document.getElementById('noData').style.display = 'none';
                    document.getElementById('dataContent').style.display = 'block';
                    
                    updateStats();
                    updateSections();
                    updateTable();
                    populateSectionFilter();
                } catch (error) {
                    console.error('Error:', error);
                    alert('Error processing file. Please ensure it is a valid Excel or CSV file.');
                    document.getElementById('loadingOverlay').classList.remove('active');
                }
            };
            reader.readAsArrayBuffer(file);
        }
        
        function parseBudgetData(rawData) {
            budgetData = [];
            sections = [];
            let currentSection = '';
            
            const startRow = 5;
            
            for (let i = startRow; i < rawData.length; i++) {
                const row = rawData[i];
                if (!row || row.length === 0) continue;
                
                if (row[0] && !row[1] && !row[2]) {
                    currentSection = row[0].toString().trim();
                    if (currentSection && !sections.find(s => s.name === currentSection)) {
                        sections.push({ name: currentSection, items: 0, totalAmount: 0 });
                    }
                    continue;
                }
                
                if (row[0] && row[1]) {
                    const item = {
                        section: currentSection,
                        program: row[0] ? row[0].toString().trim() : '',
                        code: row[1] ? row[1].toString().trim() : '',
                        unit: row[2] ? row[2].toString().trim() : '',
                        appropriation: parseAmount(row[4]),
                        ps: parseAmount(row[5]),
                        mooe: parseAmount(row[6]),
                        co: parseAmount(row[7]),
                        fe: parseAmount(row[8]),
                        total: parseAmount(row[9]),
                        row: i
                    };
                    
                    budgetData.push(item);
                    const section = sections.find(s => s.name === currentSection);
                    if (section) { section.items++; section.totalAmount += item.total; }
                }
            }
            currentData = [...budgetData];
        }
        
        function parseAmount(value) {
            if (!value) return 0;
            if (typeof value === 'number') return value;
            const cleaned = value.toString().replace(/[^\d.-]/g, '');
            return parseFloat(cleaned) || 0;
        }
        
        function formatAmount(amount) {
            if (amount === 0) return '-';
            return '₱' + amount.toLocaleString('en-PH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }
        
        function updateStats() {
            const totalItems = budgetData.length;
            const totalAmount = budgetData.reduce((sum, item) => sum + item.total, 0);
            const totalSections = sections.length;
            const avgAmount = totalItems > 0 ? totalAmount / totalItems : 0;
            
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card"><div class="stat-value">${totalItems}</div><div class="stat-label">Total Programs</div></div>
                <div class="stat-card"><div class="stat-value">${totalSections}</div><div class="stat-label">Sections</div></div>
                <div class="stat-card"><div class="stat-value">${formatAmount(totalAmount)}</div><div class="stat-label">Total Budget</div></div>
                <div class="stat-card"><div class="stat-value">${formatAmount(avgAmount)}</div><div class="stat-label">Average per Program</div></div>
            `;
        }
        
        function updateSections() {
            const totalBudget = budgetData.reduce((sum, i) => sum + i.total, 0);
            document.getElementById('sectionsGrid').innerHTML = sections.map(section => `
                <div class="section-card" onclick="filterSection('${section.name.replace(/'/g, "\\'")}')">
                    <div class="section-header">
                        <div class="section-title">${section.name}</div>
                        <div class="section-meta"><span><i class="fas fa-list"></i> ${section.items} items</span></div>
                    </div>
                    <div class="section-body">
                        <div class="budget-info">
                            <div class="budget-item"><div class="budget-amount">${formatAmount(section.totalAmount)}</div><div class="budget-label">Total Budget</div></div>
                            <div class="budget-item"><div class="budget-amount">${((section.totalAmount / totalBudget) * 100).toFixed(1)}%</div><div class="budget-label">of Total</div></div>
                        </div>
                        <button class="view-details-btn"><i class="fas fa-eye"></i> View Programs</button>
                    </div>
                </div>
            `).join('');
        }
        
        function updateTable() {
            document.getElementById('tableHeader').innerHTML = `
                <th>Section</th><th>Program/PPA</th><th>FPP Code</th><th>Implementing Unit</th>
                <th>Total Appropriation</th><th>PS</th><th>MOOE</th><th>CO</th><th>FE</th>
            `;
            
            document.getElementById('tableBody').innerHTML = currentData.map(item => `
                <tr>
                    <td><span class="pill">${item.section || 'N/A'}</span></td>
                    <td>${item.program}</td>
                    <td><code>${item.code}</code></td>
                    <td>${item.unit}</td>
                    <td class="amount-cell">${formatAmount(item.total)}</td>
                    <td class="amount-cell">${formatAmount(item.ps)}</td>
                    <td class="amount-cell">${formatAmount(item.mooe)}</td>
                    <td class="amount-cell">${formatAmount(item.co)}</td>
                    <td class="amount-cell">${formatAmount(item.fe)}</td>
                </tr>
            `).join('');
            
            document.getElementById('rowCount').textContent = `${currentData.length} records`;
        }
        
        function populateSectionFilter() {
            const filter = document.getElementById('sectionFilter');
            filter.innerHTML = '<option value="">All Sections</option>' +
                sections.map(s => `<option value="${s.name}">${s.name}</option>`).join('');
        }
        
        function searchData() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            currentData = budgetData.filter(item =>
                item.program.toLowerCase().includes(searchTerm) ||
                item.code.toLowerCase().includes(searchTerm) ||
                item.unit.toLowerCase().includes(searchTerm)
            );
            updateTable();
        }
        
        function filterBySection() {
            const section = document.getElementById('sectionFilter').value;
            currentData = section ? budgetData.filter(item => item.section === section) : [...budgetData];
            updateTable();
        }
        
        function filterSection(sectionName) {
            document.getElementById('sectionFilter').value = sectionName;
            filterBySection();
            document.querySelector('.data-table-container').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
        
        function exportToExcel() {
            const exportData = currentData.map(item => ({
                'Section': item.section,
                'Program/PPA': item.program,
                'FPP Code': item.code,
                'Implementing Unit': item.unit,
                'Appropriation': item.total,
                'PS': item.ps,
                'MOOE': item.mooe,
                'CO': item.co,
                'FE': item.fe
            }));
            
            const ws = XLSX.utils.json_to_sheet(exportData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'AIP Budget');
            XLSX.writeFile(wb, 'AIP_Budget_Export.xlsx');
        }
        
        function clearData() {
            budgetData = [];
            sections = [];
            currentData = [];
            document.getElementById('dataContent').style.display = 'none';
            document.getElementById('noData').style.display = 'block';
            document.getElementById('fileInput').value = '';
        }
    </script>
</body>
</html>
